<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="RPS">
  <title>RPS Reflex</title>
  <!-- Cream paper (#f7f4ec H theme background) -->
  <rect width="32" height="32" rx="7" fill="#f7f4ec" />
  <!-- Kraft ink stroke (#5a3a28 H oklch primary) -->
  <g
    fill="none"
    stroke="#5a3a28"
    stroke-width="1.75"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <!-- Rock: low cobble -->
    <path
      d="M6.5 23.5c-.3-2.5 1-4.7 3-6.2 1.6-1.2 3.8-1.5 5.6-.5 2 1.1 2.8 3.3 2.2 5.4-.6 2.3-2.8 3.8-5.2 3.6-2.1-.2-3.8-1.2-4.6-2.3"
    />
    <!-- Paper: torn sheet -->
    <path
      d="M15.5 7.5h10.5c.8 0 1.3.6 1.3 1.4v11.4c0 1.2-1 2-2.1 1.7l-3.2-.7-2.6 2.4c-.9.8-2.4.4-2.7-.8L15.5 20V7.5z"
    />
    <path d="M22.5 7.5v5.5l3.2-1.8" stroke-width="1.35" opacity="0.55" />
    <!-- Scissors: blades + pivot -->
    <circle cx="24" cy="22" r="1.35" fill="#5a3a28" stroke="none" />
    <path d="M24 22l-4.5-8.5M24 22l1.5-9" />
  </g>
</svg>
